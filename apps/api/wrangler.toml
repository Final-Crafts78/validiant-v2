name = "validiant-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 1. Locks in your Custom Domain
routes = [
  { pattern = "api.validiant.in", custom_domain = true }
]

# 2. Locks in your Public Environment Variables
[vars]
FRONTEND_URL = "https://www.validiant.in"
CORS_ORIGIN = "https://www.validiant.in"
WEB_APP_URL = "https://www.validiant.in"
GOOGLE_REDIRECT_URI = "https://api.validiant.in/api/v1/oauth/google/callback"

[observability]
enabled = true

[[kv_namespaces]]
binding = "DENYLIST"
id = "DENYLIST_KV_ID_PLACEHOLDER" # To be replaced by user in Cloudflare Dash
preview_id = "DENYLIST_KV_PREVIEW_ID_PLACEHOLDER"

[durable_objects]
bindings = [
  { name = "REALTIME_ROOMS", class_name = "RealtimeRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["RealtimeRoom"]

[triggers]
crons = ["*/5 * * * *"]