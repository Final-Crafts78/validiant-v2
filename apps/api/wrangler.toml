name = "validiant-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 1. Custom Domain & Route Mapping (Synced with Remote)
routes = [
  { pattern = "api.validiant.in/*", zone_name = "validiant.in" },
  { pattern = "api.validiant.in", custom_domain = true, zone_name = "validiant.in" }
]

# 2. Public Environment Variables (Synced with Dashboard)
[vars]
NODE_ENV = "production"
FRONTEND_URL = "https://www.validiant.in"
CORS_ORIGIN = "https://www.validiant.in"
WEB_APP_URL = "https://www.validiant.in"
COOKIE_DOMAIN = ".validiant.in"
GOOGLE_REDIRECT_URI = "https://api.validiant.in/api/v1/oauth/google/callback"
GITHUB_REDIRECT_URI = "https://api.validiant.in/api/v1/oauth/github/callback"

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "REALTIME_ROOMS", class_name = "RealtimeRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeRoom"]

[triggers]
crons = ["*/5 * * * *"]

# 3. Webhook Dispatcher Queue (Phase 13.5 - Command Center)
[[queues.producers]]
binding = "WEBHOOK_DISPATCHER"
queue = "webhook-dispatch-queue"

[[queues.consumers]]
queue = "webhook-dispatch-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3